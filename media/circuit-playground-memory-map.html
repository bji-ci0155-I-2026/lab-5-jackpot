<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ATmega32u4 — Mapa de Memoria</title>
<style>
  :root {
    --bg: #f5f4f0;
    --card: #ffffff;
    --border: rgba(0,0,0,0.10);
    --text: #1a1a18;
    --text2: #5f5e5a;
    --blue-50: #E6F1FB; --blue-600: #185FA5; --blue-800: #0C447C;
    --teal-50: #E1F5EE; --teal-600: #0F6E56; --teal-800: #085041;
    --purple-50: #EEEDFE; --purple-600: #534AB7; --purple-800: #3C3489;
    --coral-50: #FAECE7; --coral-600: #993C1D; --coral-800: #712B13;
    --amber-50: #FAEEDA; --amber-600: #854F0B; --amber-800: #633806;
    --green-50: #EAF3DE; --green-600: #3B6D11; --green-800: #27500A;
    --gray-50: #F1EFE8; --gray-600: #5F5E5A; --gray-800: #444441;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1a1a18; --card: #23231f; --border: rgba(255,255,255,0.10);
      --text: #e8e6de; --text2: #888780;
      --blue-50: #042C53; --blue-600: #85B7EB; --blue-800: #B5D4F4;
      --teal-50: #04342C; --teal-600: #5DCAA5; --teal-800: #9FE1CB;
      --purple-50: #26215C; --purple-600: #AFA9EC; --purple-800: #CECBF6;
      --coral-50: #4A1B0C; --coral-600: #F0997B; --coral-800: #F5C4B3;
      --amber-50: #412402; --amber-600: #EF9F27; --amber-800: #FAC775;
      --green-50: #173404; --green-600: #97C459; --green-800: #C0DD97;
      --gray-50: #2C2C2A; --gray-600: #B4B2A9; --gray-800: #D3D1C7;
    }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    font-family: 'Courier New', 'JetBrains Mono', monospace;
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 2rem 1rem;
  }
  h1 {
    font-size: 1rem;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text2);
    margin-bottom: 0.25rem;
  }
  p.sub {
    font-size: 0.75rem;
    color: var(--text2);
    margin-bottom: 2rem;
    letter-spacing: 0.05em;
  }
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.5rem;
    width: 100%;
    max-width: 720px;
  }
  svg { display: block; width: 100%; }

  /* colour classes matching the widget system */
  .c-blue   rect, .c-blue   circle { fill: var(--blue-50);   stroke: var(--blue-600); }
  .c-teal   rect, .c-teal   circle { fill: var(--teal-50);   stroke: var(--teal-600); }
  .c-purple rect, .c-purple circle { fill: var(--purple-50); stroke: var(--purple-600); }
  .c-coral  rect, .c-coral  circle { fill: var(--coral-50);  stroke: var(--coral-600); }
  .c-amber  rect, .c-amber  circle { fill: var(--amber-50);  stroke: var(--amber-600); }
  .c-green  rect, .c-green  circle { fill: var(--green-50);  stroke: var(--green-600); }
  .c-gray   rect, .c-gray   circle { fill: var(--gray-50);   stroke: var(--gray-600); }

  .c-blue   .th, .c-blue   .ts { fill: var(--blue-800);   }
  .c-teal   .th, .c-teal   .ts { fill: var(--teal-800);   }
  .c-purple .th, .c-purple .ts { fill: var(--purple-800); }
  .c-coral  .th, .c-coral  .ts { fill: var(--coral-800);  }
  .c-amber  .th, .c-amber  .ts { fill: var(--amber-800);  }
  .c-green  .th, .c-green  .ts { fill: var(--green-800);  }
  .c-gray   .th, .c-gray   .ts { fill: var(--gray-800);   }

  text.th { font-family: 'Courier New', monospace; font-size: 14px; font-weight: 700; fill: var(--text); }
  text.ts { font-family: 'Courier New', monospace; font-size: 12px; font-weight: 400; fill: var(--text2); }

  .arr { stroke: var(--text2); stroke-width: 1.5; fill: none; }
  .leader { stroke: var(--text2); stroke-width: 0.5; stroke-dasharray: 4 3; fill: none; }
</style>
</head>
<body>
<h1>ATmega32u4 — Mapa de Memoria</h1>
<p class="sub">Circuit Playground Classic · Flash 32 KB · SRAM 2.5 KB · EEPROM 1 KB</p>
<div class="card">
<svg viewBox="0 0 680 620" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Mapa de memoria ATmega32u4</title>
  <desc>Diagrama mostrando Flash, SRAM y EEPROM del ATmega32u4 con sus regiones internas</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- FLASH -->
  <g class="c-blue">
    <rect x="40" y="30" width="180" height="24" rx="6" stroke-width="0.5"/>
    <text class="th" x="130" y="42" text-anchor="middle" dominant-baseline="central">Flash  (32 KB)</text>
  </g>
  <g class="c-teal">
    <rect x="40" y="58" width="180" height="100" rx="0" stroke-width="0.5"/>
    <text class="th" x="130" y="90" text-anchor="middle" dominant-baseline="central">Sketch</text>
    <text class="ts" x="130" y="112" text-anchor="middle" dominant-baseline="central">__data_load_end</text>
    <text class="ts" x="130" y="132" text-anchor="middle" dominant-baseline="central">marca aquí ↓</text>
  </g>
  <g class="c-gray">
    <rect x="40" y="158" width="180" height="44" rx="0" stroke-width="0.5"/>
    <text class="th" x="130" y="180" text-anchor="middle" dominant-baseline="central">Bootloader (~4 KB)</text>
  </g>
  <line x1="222" y1="108" x2="290" y2="108" class="arr" marker-end="url(#arrow)" stroke="#1D9E75"/>
  <text class="ts" x="298" y="98" fill="#0F6E56">usedFlash()</text>
  <text class="ts" x="298" y="114" fill="#0F6E56">lee &amp;__data_load_end</text>

  <!-- SRAM -->
  <g class="c-purple">
    <rect x="40" y="230" width="180" height="24" rx="6" stroke-width="0.5"/>
    <text class="th" x="130" y="242" text-anchor="middle" dominant-baseline="central">SRAM  (2560 B)</text>
  </g>
  <g class="c-gray">
    <rect x="40" y="258" width="180" height="32" rx="0" stroke-width="0.5"/>
    <text class="ts" x="130" y="274" text-anchor="middle" dominant-baseline="central">.data  (vars globales)</text>
  </g>
  <g class="c-gray">
    <rect x="40" y="290" width="180" height="28" rx="0" stroke-width="0.5"/>
    <text class="ts" x="130" y="304" text-anchor="middle" dominant-baseline="central">.bss  (vars a cero)</text>
  </g>
  <line x1="40" y1="318" x2="220" y2="318" stroke-width="1" stroke-dasharray="4 3" stroke="#888780" fill="none"/>
  <text class="ts" x="34" y="316" text-anchor="end">__heap_start</text>
  <g class="c-coral">
    <rect x="40" y="320" width="180" height="52" rx="0" stroke-width="0.5"/>
    <text class="th" x="130" y="340" text-anchor="middle" dominant-baseline="central">Heap ↓</text>
    <text class="ts" x="130" y="358" text-anchor="middle" dominant-baseline="central">malloc / new</text>
  </g>
  <line x1="40" y1="372" x2="220" y2="372" stroke-width="1" stroke-dasharray="4 3" stroke="#D85A30" fill="none"/>
  <text class="ts" x="34" y="370" text-anchor="end" fill="#993C1D">__brkval ↑</text>
  <rect x="40" y="374" width="180" height="60" rx="0" fill="none" stroke="#B4B2A9" stroke-width="0.5" stroke-dasharray="6 3"/>
  <text class="th" x="130" y="400" text-anchor="middle" dominant-baseline="central">GAP = SRAM libre</text>
  <text class="ts" x="130" y="418" text-anchor="middle" dominant-baseline="central">lo mide freeMemorySRAM()</text>
  <g class="c-amber">
    <rect x="40" y="436" width="180" height="52" rx="0" stroke-width="0.5"/>
    <text class="th" x="130" y="456" text-anchor="middle" dominant-baseline="central">Stack ↑</text>
    <text class="ts" x="130" y="474" text-anchor="middle" dominant-baseline="central">&amp;freeValue vive aquí</text>
  </g>
  <line x1="40" y1="488" x2="220" y2="488" stroke-width="1" stroke-dasharray="4 3" stroke="#BA7517" fill="none"/>
  <text class="ts" x="34" y="486" text-anchor="end" fill="#854F0B">SP (tope)</text>
  <line x1="222" y1="404" x2="290" y2="404" class="arr" marker-end="url(#arrow)" stroke="#7F77DD"/>
  <text class="ts" x="298" y="394" fill="#534AB7">freeMemorySRAM()</text>
  <text class="ts" x="298" y="410" fill="#534AB7">SP − __brkval</text>

  <!-- EEPROM -->
  <g class="c-green">
    <rect x="40" y="528" width="180" height="24" rx="6" stroke-width="0.5"/>
    <text class="th" x="130" y="540" text-anchor="middle" dominant-baseline="central">EEPROM  (1024 B)</text>
  </g>
  <g class="c-gray">
    <rect x="40" y="556" width="100" height="30" rx="0" stroke-width="0.5"/>
    <text class="ts" x="90" y="571" text-anchor="middle" dominant-baseline="central">usada (!= 0xFF)</text>
  </g>
  <g class="c-teal">
    <rect x="140" y="556" width="80" height="30" rx="0" stroke-width="0.5"/>
    <text class="ts" x="180" y="571" text-anchor="middle" dominant-baseline="central">libre (0xFF)</text>
  </g>
  <line x1="222" y1="571" x2="290" y2="571" class="arr" marker-end="url(#arrow)" stroke="#3B6D11"/>
  <text class="ts" x="298" y="561" fill="#27500A">countEEPROMFree()</text>
  <text class="ts" x="298" y="577" fill="#27500A">cuenta celdas == 0xFF</text>
</svg>
</div>
</body>
</html>
